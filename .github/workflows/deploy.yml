name: preview
on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    # paths:
    #   - "src/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write
  deployments: write

env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  BUILD_DIR: output

jobs:
  preview:
    runs-on: ubuntu-latest
    concurrency: preview-${{ github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub deployment
        if: github.event.action != 'closed'
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const deployment = await github.rest.repos.createDeployment({
              owner, repo,
              ref: context.payload.pull_request.head.sha,
              environment: `pr-${ context.payload.pull_request.number }`,
              description: `Preview for PR #${ context.payload.pull_request.number }`,
              auto_merge: false,
              required_contexts: [],   // skip status checks
              transient_environment: true,
              production_environment: false,
            });
            core.setOutput("deployment_id", deployment.data.id);

      - name: Set deployment status → in_progress
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: process.env.DEPLOYMENT_ID,
              state: "in_progress",
              description: "Building and deploying preview…",
            });
      - name: Setup Deno
        if: github.event.action != 'closed'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        if: github.event.action != 'closed'
        uses: actions/cache@v4
        with:
          path: |
            ~/.deno
            ~/.cache/deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Cache build output
        if: github.event.action != 'closed'
        id: build-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}
          key: ${{ runner.os }}-build-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build site (Deno)
        if: github.event.action != 'closed' && steps.build-cache.outputs.cache-hit != 'true' # ← skip if cached
        run: deno task build
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-deployer-blueprint_website
          role-session-name: gh-deploy-static

      - name: Claim or release slot
        env:
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
          CLAIM_URL: ${{ secrets.PREVIEW_CLAIM_ENDPOINT }}
          RELEASE_URL: ${{ secrets.PREVIEW_RELEASE_ENDPOINT }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.action }}" = "closed" ]; then
            curl -fSs -X POST "$RELEASE_URL" \
              -H "content-type: application/json" \
              -d "{\"repo\":\"$REPO\",\"prNumber\":$PR}"
            exit 0
          fi

          curl -fSs -X POST "$CLAIM_URL" \
            -H "content-type: application/json" \
            -d "{\"repo\":\"$REPO\",\"prNumber\":$PR,\"commitSha\":\"$SHA\"}" \
            -o preview-slot.json

          echo "Claim response:"
          cat preview-slot.json

      - name: Parse preview slot response
        if: github.event.action != 'closed'
        id: slot
        run: |
          set -euo pipefail
          BUCKET="$(jq -er '.bucketName' preview-slot.json)"
          DIST_ID="$(jq -r '.distributionId // empty' preview-slot.json)"
          URL="$(jq -er '.previewUrl' preview-slot.json)"

          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "dist_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Deploy to S3
        if: github.event.action != 'closed'
        env:
          BUCKET: ${{ steps.slot.outputs.bucket }}
        run: |
          set -euo pipefail
          aws s3 sync ./output "s3://$BUCKET" --delete

      - name: Invalidate CloudFront
        if: github.event.action != 'closed' && steps.slot.outputs.dist_id != ''
        env:
          DIST_ID: ${{ steps.slot.outputs.dist_id }}
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
      - name: Set deployment status → success
        if: github.event.action != 'closed' && success()
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
          PREVIEW_URL: ${{ steps.slot.outputs.url }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: process.env.DEPLOYMENT_ID,
              state: "success",
              environment_url: process.env.PREVIEW_URL,
              description: "Preview deployed successfully",
              auto_inactive: true,
            });

      - name: Set deployment status → failure
        if: github.event.action != 'closed' && failure()
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: process.env.DEPLOYMENT_ID,
              state: "failure",
              description: "Preview deployment failed",
            });
      - name: Deactivate deployment on PR close
        if: github.event.action == 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request.number;
            const env = `pr-${pr}`;

            const deployments = await github.rest.repos.listDeployments({
              owner, repo, environment: env, per_page: 100
            });

            for (const d of deployments.data) {
              await github.rest.repos.createDeploymentStatus({
                owner, repo,
                deployment_id: d.id,
                state: "inactive",
              });
            }

      - name: Comment preview URL on PR
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.slot.outputs.url }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = "<!-- preview-url -->";
            const body = `${marker}\n🔍 Preview deployed: ${process.env.PREVIEW_URL}`;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body
              });
            }
