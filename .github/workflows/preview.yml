name: preview
on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  id-token: write
  contents: read
env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  BUILD_DIR: output

jobs:
  preview:
    runs-on: ubuntu-latest
    concurrency: preview-${{ github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        if: github.event.action != 'closed'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        if: github.event.action != 'closed'
        uses: actions/cache@v4
        with:
          path: |
            ~/.deno
            ~/.cache/deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-
      - name: Cache build output
        if: github.event.action != 'closed'
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build site (Deno)
        if: github.event.action != 'closed'
        run: deno task build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-deployer-blueprint_website
          role-session-name: gh-deploy-static

      # --- RELEASE (separate step) ---
      - name: Release slot (on PR close)
        if: github.event.action == 'closed'
        env:
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          RELEASE_URL: ${{ secrets.PREVIEW_RELEASE_ENDPOINT }}
        run: |
          set -euo pipefail
          curl -fSs -X POST "$RELEASE_URL" \
            -H "content-type: application/json" \
            -d "{\"repo\":\"$REPO\",\"prNumber\":$PR}"

      - name: Claim preview slot
        if: github.event.action != 'closed'
        env:
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
          CLAIM_URL: ${{ secrets.PREVIEW_CLAIM_ENDPOINT }}
        run: |
          set -euo pipefail

          # -f makes curl fail non-2xx; -S prints errors; -s keeps it quiet otherwise
          curl -fSs -X POST "$CLAIM_URL" \
            -H "content-type: application/json" \
            -d "{\"repo\":\"$REPO\",\"prNumber\":$PR,\"commitSha\":\"$SHA\"}" \
            -o preview-slot.json

          echo "Claim response saved to preview-slot.json"
          cat preview-slot.json

      - name: Parse preview slot response
        if: github.event.action != 'closed'
        id: slot
        run: |
          set -euo pipefail
          BUCKET="$(jq -er '.bucketName' preview-slot.json)"
          URL="$(jq -er '.previewUrl' preview-slot.json)"

          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

          echo "Bucket: $BUCKET"
          echo "URL: $URL"

      - name: Deploy to S3
        if: github.event.action != 'closed'
        env:
          BUCKET: ${{ steps.slot.outputs.bucket }}
        run: |
          set -euo pipefail
          aws s3 sync ./output "s3://$BUCKET" --delete
